# CI for the score-validation public artifact.
#
# Job 1 (analysis) is the reproducibility promise: the full test suite runs,
# then every number, macro, table and figure behind the paper is regenerated
# from the released iclr2026 CSVs (analysis/data/iclr2026/) on every push.
# Job 2 (paper) compiles paper/main.tex against Job 1's generated inputs and
# catches macro/figure drift the static `check` cannot.
#
# No network beyond pip / TeX package installs; no secrets.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analysis
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: analysis/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # analysis/data/synthetic/ is gitignored (dev-only, schema-conformant
      # fake data); 15 tests in the suite load it, so generate it first.
      - name: Generate synthetic dataset
        run: python cli.py synth

      - name: Run test suite
        run: python cli.py test

      # Deterministic, network-free rebuild from the released CSVs. Also
      # removes any SYNTHETIC.flag so Job 2 compiles the real-data paper.
      - name: Rebuild results from released CSVs
        run: python cli.py analyze --dataset iclr2026

      # sim_macros.tex + figS_power.pdf come from simulate, not analyze, and
      # `check` lints both. --quick mirrors the `all` pipeline's own ordering
      # and keeps CI runtime bounded; it is not a scope change.
      - name: Simulation macros (quick)
        run: python cli.py simulate --quick

      # secondary_macros.tex (comment-quality comparison) — main.tex inputs it.
      - name: Secondary analysis macros
        run: python cli.py secondary

      - name: Static checks (data contract + macro lint + fig/table refs)
        run: python cli.py check --dataset iclr2026

      # The generated paper inputs are gitignored; Job 2 compiles against
      # them, so hand them over as an artifact (paths are repo-root relative).
      - name: Upload generated paper inputs
        uses: actions/upload-artifact@v4
        with:
          name: paper-inputs
          path: |
            paper/macros/
            paper/tables/
            paper/figures/
          if-no-files-found: error

  paper:
    runs-on: ubuntu-latest
    needs: analysis
    steps:
      # fetch-depth: 0 — `cli.py paper` renders prereg_verbatim.tex from
      # `git show prereg-iclr2026-v2:DECISIONS.md` and hard-exits if the tag
      # is absent; shallow clones do not fetch tags.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Multi-path uploads strip the common ancestor (paper/), so this
      # restores paper/macros/, paper/tables/, paper/figures/.
      - name: Download generated paper inputs
        uses: actions/download-artifact@v4
        with:
          name: paper-inputs
          path: paper/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: analysis/requirements.txt

      # cli.py imports common, which needs the scientific stack.
      - name: Install dependencies
        run: pip install -r analysis/requirements.txt

      # Install TeX Live from Ubuntu's archive rather than a third-party action.
      # The four collections below cover paper/main.tex's full preamble:
      #   base:        pdflatex, geometry, amsmath, graphics, hyperref
      #   recommended: caption/subcaption, xcolor, natbib, booktabs, xspace
      #   extra:       remaining contrib packages
      #   fonts-rec:   lmodern, amsfonts
      # texlive-binaries (bibtex) comes in as a dependency of these.
      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended

      # pdflatex + bibtex + pdflatex x2; raises on any `! ` LaTeX error.
      - name: Compile paper
        run: python cli.py paper
        working-directory: analysis

      - name: Upload compiled paper
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/main.pdf
          if-no-files-found: error
